<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Java Health Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .status-up { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">🏥 Admin Hospital - Backend Java</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h5>Estado del Sistema</h5>
                    <p class="status-up">● ONLINE</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h5>Servidor de Datos</h5>
                    <p>H2 Database (Activa)</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h5>Conector Kafka</h5>
                    <p>Listening on :9092</p>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <h4 class="mb-3">📋 Registro Global de Alertas</h4>
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Paciente</th>
                        <th>Pulsaciones</th>
                        <th>Oxígeno</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="alerta : ${alertas}">
                        <td th:text="${alerta.id}"></td>
                        <td th:text="${alerta.pacienteId}"></td>
                        <td th:text="${alerta.frecuencia}" 
                            th:class="${alerta.frecuencia > 100} ? 'text-danger fw-bold' : ''"></td>
                        <td th:text="${alerta.oxigeno} + '%'"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
